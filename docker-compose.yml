services:
  ai-store-copilot:
    build:
      context: .
    image: ai-store-copilot:aws
    container_name: ai-store-copilot
    env_file:
      - .env
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
